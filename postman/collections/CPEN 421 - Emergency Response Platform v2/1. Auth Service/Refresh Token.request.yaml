$kind: http-request
url: "{{base_auth}}/auth/refresh-token"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "refresh_token": "{{refresh_token}}"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.access_token) {
        pm.collectionVariables.set('token', res.data.access_token);
        pm.collectionVariables.set('refresh_token', res.data.refresh_token);
        console.log('Token refreshed:', res.data.access_token);
      }
      pm.test('Token refreshed', () => {
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 3000
