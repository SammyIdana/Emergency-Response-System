$kind: http-request
url: "{{base_incident}}/responders"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "unit_type": "police",
      "name": "Accra Central Police",
      "latitude": 5.5502,
      "longitude": -0.2174
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.unit_id) {
        pm.collectionVariables.set('unit_id', res.data.unit_id);
        console.log('Unit ID saved:', res.data.unit_id);
      }
      pm.test('Responder registered', () => {
        pm.expect(res.success).to.be.true;
      });
    language: text/javascript
order: 1000
